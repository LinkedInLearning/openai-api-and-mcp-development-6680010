name: Run AI Model

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  run-ai-model:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install openai
      - name: Run AI model script
        run: |
          python ai_model_example.py
