name: Python Install & GitHub Models

on:
  push:
    branches: [ "main" ]

permissions:
  contents: read
  models: read

jobs:
  install:
    name: Install Python dependencies
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: python -m pip install --upgrade pip
      - run: pip install -r requirements.txt

      - run: echo "::notice::✅ Python dependencies installed successfully!"

  # add one step here to call the GitHub Models action to download a model